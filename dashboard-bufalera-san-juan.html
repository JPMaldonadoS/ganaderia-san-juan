                const fechaSalida = movimiento.fechaSalida ? new Date(movimiento.fechaSalida + 'T12:00:00') : null;
                
                if (!fechaSalida) {
                    // Rotación actual en curso - calcular cuadras usadas hasta hoy
                    const diasEnLote = calcularDiasEntreFechas(movimiento.fechaEntrada, null);
                    const diasNecesarios = getDiasRecuperacion(FECHA_ACTUAL);
                    const cuadras = [];
                    
                    // Generar cuadras para cada día que ya pasó (desde entrada hasta hoy)
                    for (let i = 1; i <= diasEnLote; i++) {
                        const fechaUsoCuadra = new Date(fechaEntrada);
                        fechaUsoCuadra.setDate(fechaUsoCuadra.getDate() + (i - 1));
                        const fechaUsoStr = fechaUsoCuadra.toISOString().split('T')[0];
                        
                        // Calcular días desde que dejó de usarse esta cuadra
                        // La cuadra i dejó de usarse el día i+1 (o hoy si es la última)
                        const fechaDejoUso = new Date(fechaUsoCuadra);
                        fechaDejoUso.setDate(fechaDejoUso.getDate() + 1);
                        
                        const esCuadraActual = (fechaUsoStr === FECHA_ACTUAL);
                        
                        if (esCuadraActual) {
                            // Cuadra actual - todavía en uso
                            cuadras.push({
                                numero: i,
                                diasReposo: 0,
                                diasRestantes: diasNecesarios,
                                porcentaje: 0,
                                disponible: false,
                                fechaUso: fechaUsoStr,
                                enUso: true
                            });
                        } else {
                            // Cuadras anteriores - ya empezaron su recuperación
                            const diffTimeDesdeDejoUso = hoy - fechaDejoUso;
                            const diasDesdeDejoUso = Math.max(0, Math.floor(diffTimeDesdeDejoUso / (1000 * 60 * 60 * 24)));
                            
                            const diasReposoCuadra = diasDesdeDejoUso;
                            const diasRestantesCuadra = Math.max(0, diasNecesarios - diasReposoCuadra);
                            const porcentajeCuadra = Math.min(100, Math.round((diasReposoCuadra / diasNecesarios) * 100));
                            
                            cuadras.push({
                                numero: i,
                                diasReposo: diasReposoCuadra,
                                diasRestantes: diasRestantesCuadra,
                                porcentaje: porcentajeCuadra,
                                disponible: diasRestantesCuadra <= 0,
                                fechaUso: fechaUsoStr,
                                enUso: false
                            });
                        }
                    }
                    
                    rotaciones.push({
                        numero: numeroRotacion,
                        estado: 'en_uso',
                        fechaEntrada: movimiento.fechaEntrada,
                        fechaSalida: null,
                        diasEnLote,
                        diasNecesarios,
                        diasDesdeSalida: 0,
                        cuadras
                    });
                    return;
                }
                
                // Días que estuvieron en el lote (incluyendo día de entrada y salida - inclusivo)
                const diffTimeEnLote = fechaSalida - fechaEntrada;
                const diasEnLote = Math.floor(diffTimeEnLote / (1000 * 60 * 60 * 24)) + 1;
                
                // Usar la temporada de cuando salieron los animales

                // Generar array de cuadras (una por cada día en el lote)

                    // Calcular fecha de uso de esta cuadra
                    const fechaUsoCuadra = new Date(fechaEntrada);
                    fechaUsoCuadra.setDate(fechaUsoCuadra.getDate() + (i - 1));
                    const fechaUsoStr = fechaUsoCuadra.toISOString().split('T')[0];
                    
                    // Fecha en que esta cuadra dejó de usarse (día siguiente al uso)

                    fechaDejoUso.setDate(fechaDejoUso.getDate() + 1);
                    
                    // Calcular días de reposo desde que dejó de usarse hasta hoy

                    // Si el día de hoy es el primer día de reposo, entonces 1 día

                    const diasReposoCuadra = Math.max(0, Math.floor(diffTimeDesdeDejoUso / (1000 * 60 * 60 * 24)) + 1);
                    
                    const diasRestantesCuadra = Math.max(0, diasNecesarios - diasReposoCuadra);
                    const porcentajeCuadra = Math.min(100, Math.round((diasReposoCuadra / diasNecesarios) * 100));
                    
                    cuadras.push({
                        numero: i,
                        diasReposo: diasReposoCuadra,
                        diasRestantes: diasRestantesCuadra,
                        porcentaje: porcentajeCuadra,
                        disponible: diasRestantesCuadra <= 0,
                        fechaUso: fechaUsoStr
                    });
                }
                
                // Calcular estado de esta rotación
                const todasDisponibles = cuadras.every(c => c.disponible);
                const algunaDisponible = cuadras.some(c => c.disponible);

                if (todasDisponibles) {
                    estadoRotacion = 'disponible';

                    estadoRotacion = 'parcial';
                } else {

                const ultimaCuadra = cuadras[cuadras.length - 1] || primeraCuadra;

                fechaInicioReposo.setDate(fechaInicioReposo.getDate() + 1); // Día siguiente a la salida

                    diasRestantesUltima: ultimaCuadra.diasRestantes,

                });

                                            });
                                        })()}
                                    </div>
                                </div>
                                
                                {(() => {
                                    try {
                                        // Generar registros automáticos basados en pagosRealizados y cálculos
                                        const generarRegistrosAutomaticos = () => {
                                            const registros = [];
                                            
                                            try {
                                                // 1. Empleados fijos (Adriana y George)
                                                if (PERSONAL_FINCA && Array.isArray(PERSONAL_FINCA)) {
                                                    PERSONAL_FINCA.filter(p => p.tipo === 'fijo').forEach(empleado => {
                                                        try {
                                                            const keyPago = `personal_${empleado.id}_${quincenaSeleccionada}`;
                                                            const pagoInfo = pagosRealizados[keyPago];
                                                            
                                                            if (pagoInfo?.pagado) {
                                                                const nomina = calcularNominaQuincenal(empleado.id, quincenaSeleccionada);
                                                                if (nomina) {
                                                                    // Buscar si hay archivo adjunto en historialPagosConArchivos
                                                                    const pagoConArchivo = historialPagosConArchivos.find(p => 
                                                                        p.personalId === empleado.id && 
                                                                        p.quincena === quincenaSeleccionada &&
                                                                        p.tipo === 'nomina'
                                                                    );
                                                                    
                                                                    registros.push({
                                                                        id: `auto_personal_${empleado.id}_${quincenaSeleccionada}`,
                                                                        fecha: pagoInfo.fecha || FECHA_ACTUAL,
                                                                        quincena: quincenaSeleccionada,
                                                                        tipo: 'nomina',
                                                                        personalId: empleado.id,
                                                                        beneficiario: empleado.nombre,
                                                                        totalDevengado: nomina.devengados?.total || 0,
                                                                        totalDeducciones: nomina.deducciones?.total || 0,
                                                                        totalPagado: nomina.totalPagar || 0,
                                                                        archivoAdjunto: pagoConArchivo?.archivoAdjunto || null,
                                                                        tipoArchivo: pagoConArchivo?.tipoArchivo || null,
                                                                        metodoPago: pagoConArchivo?.metodoPago || 'transferencia',
                                                                        referencia: pagoConArchivo?.referencia || '',
                                                                        notas: pagoConArchivo?.notas || ''
                                                                    });
                                                                }
                                                            }
                                                        } catch (e) {
                                                            console.error('Error procesando empleado:', e);
                                                        }
                                                    });
                                                }
                                                
                                                // 2. Contratistas - Puede tener múltiples comprobantes
                                                const keyPagoContratistas = `contratistas_${quincenaSeleccionada}`;
                                                const pagoInfoContratistas = pagosRealizados[keyPagoContratistas];
                                                
                                                if (pagoInfoContratistas?.pagado) {
                                                    try {
                                                        const pagoContratistas = calcularPagoContratistas(quincenaSeleccionada);
                                                        if (pagoContratistas && pagoContratistas.totalPagar > 0) {
                                                            // Buscar TODOS los comprobantes de contratistas (pueden ser múltiples)
                                                            const comprobantesContratistas = historialPagosConArchivos.filter(p => 
                                                                p.quincena === quincenaSeleccionada &&
                                                                p.tipo === 'contratista' &&
                                                                !p.personalId &&
                                                                p.archivoAdjunto
                                                            );
                                                            
                                                            // Siempre mostrar dos pagos separados: Jornales y Tractor
                                                            const pagoJornales = pagoContratistas.jornales?.total || 0;
                                                            const pagoTractor = pagoContratistas.tractor?.total || 0;
                                                            
                                                            // Pago 1: Jornales
                                                            if (pagoJornales > 0) {
                                                                const comprobanteJornales = comprobantesContratistas.find(c => c.indiceComprobante === 1) || comprobantesContratistas[0] || null;
                                                                registros.push({
                                                                    id: `auto_contratistas_jornales_${quincenaSeleccionada}`,
                                                                    fecha: pagoInfoContratistas.fecha || FECHA_ACTUAL,
                                                                    quincena: quincenaSeleccionada,
                                                                    tipo: 'contratista',
                                                                    personalId: null,
                                                                    beneficiario: 'Contratistas (Pago 1 - Jornales)',
                                                                    totalDevengado: pagoJornales,
                                                                    totalDeducciones: 0,
                                                                    totalPagado: pagoJornales,
                                                                    archivoAdjunto: comprobanteJornales?.archivoAdjunto || null,
                                                                    tipoArchivo: comprobanteJornales?.tipoArchivo || null,
                                                                    metodoPago: comprobanteJornales?.metodoPago || 'transferencia',
                                                                    referencia: comprobanteJornales?.referencia || '',
                                                                    notas: comprobanteJornales?.notas || '',
                                                                    indiceComprobante: 1
                                                                });
                                                            }
                                                            
                                                            // Pago 2: Tractor
                                                            if (pagoTractor > 0) {
                                                                const comprobanteTractor = comprobantesContratistas.find(c => c.indiceComprobante === 2) || comprobantesContratistas[1] || null;
                                                                registros.push({
                                                                    id: `auto_contratistas_tractor_${quincenaSeleccionada}`,
                                                                    fecha: pagoInfoContratistas.fecha || FECHA_ACTUAL,
                                                                    quincena: quincenaSeleccionada,
                                                                    tipo: 'contratista',
                                                                    personalId: null,
                                                                    beneficiario: 'Contratistas (Pago 2 - Tractor)',
                                                                    totalDevengado: pagoTractor,
                                                                    totalDeducciones: 0,
                                                                    totalPagado: pagoTractor,
                                                                    archivoAdjunto: comprobanteTractor?.archivoAdjunto || null,
                                                                    tipoArchivo: comprobanteTractor?.tipoArchivo || null,
                                                                    metodoPago: comprobanteTractor?.metodoPago || 'transferencia',
                                                                    referencia: comprobanteTractor?.referencia || '',
                                                                    notas: comprobanteTractor?.notas || '',
                                                                    indiceComprobante: 2
                                                                });
                                                            }
                                                        }
                                                    } catch (e) {
                                                        console.error('Error procesando contratistas:', e);
                                                    }
                                                }
                                                
                                                // 3. Contabilidad (Yamile Otero)
                                                const keyPagoContabilidad = `contabilidad_${quincenaSeleccionada}`;
                                                const pagoInfoContabilidad = pagosRealizados[keyPagoContabilidad];
                                                
                                                if (pagoInfoContabilidad?.pagado) {
                                                    try {
                                                        const pagoConArchivo = historialPagosConArchivos.find(p => 
                                                            p.quincena === quincenaSeleccionada &&
                                                            p.tipo === 'contabilidad'
                                                        );
                                                        
                                                        registros.push({
                                                            id: `auto_contabilidad_${quincenaSeleccionada}`,
                                                            fecha: pagoInfoContabilidad.fecha || FECHA_ACTUAL,
                                                            quincena: quincenaSeleccionada,
                                                            tipo: 'contabilidad',
                                                            personalId: null,
                                                            beneficiario: 'Yamile Otero - Contabilidad',
                                                            totalDevengado: 300000,
                                                            totalDeducciones: 0,
                                                            totalPagado: 300000,
                                                            archivoAdjunto: pagoConArchivo?.archivoAdjunto || null,
                                                            tipoArchivo: pagoConArchivo?.tipoArchivo || null,
                                                            metodoPago: pagoConArchivo?.metodoPago || 'transferencia',
                                                            referencia: pagoConArchivo?.referencia || '',
                                                            notas: pagoConArchivo?.notas || ''
                                                        });
                                                    } catch (e) {
                                                        console.error('Error procesando contabilidad:', e);
                                                    }
                                                }
                                            } catch (e) {
                                                console.error('Error en generarRegistrosAutomaticos:', e);
                                            }
                                            
                                            return registros;
                                        };
                                        
                                        const registrosAutomaticos = generarRegistrosAutomaticos();
                                        const registrosFiltrados = registrosAutomaticos.filter(r => r && r.quincena === quincenaSeleccionada);
                                        
                                        if (registrosFiltrados.length === 0) {
                                            return (
                                                <div className="text-center py-8 text-gray-400">
                                                    <span className="text-4xl mb-2 block">💸</span>
                                                    <p>No hay pagos registrados para {quincenaSeleccionada}</p>
                                                    <p className="text-sm mt-1">Los pagos marcados como pagados aparecerán aquí automáticamente</p>
                                                </div>
                                            );
                                        }
                                        
                                        return (
                                            <div className="overflow-x-auto">
                                                <table className="w-full text-sm">
                                                    <thead className="bg-gray-800">
                                                        <tr>
                                                            <th className="px-3 py-2 text-left">Fecha</th>
                                                            <th className="px-3 py-2 text-left">Beneficiario</th>
                                                            <th className="px-3 py-2 text-right">Devengado</th>
                                                            <th className="px-3 py-2 text-right">Deducciones</th>
                                                            <th className="px-3 py-2 text-right">Pagado</th>
                                                            <th className="px-3 py-2 text-center">Comprobante</th>
                                                            <th className="px-3 py-2 text-center">Estado</th>
                                                        </tr>
                                                    </thead>
                                                    <tbody>
                                                        {registrosFiltrados.map((pago, idx) => (
                                                            <tr key={pago.id || idx} className="border-t border-gray-700 hover:bg-gray-800/50">
                                                                <td className="px-3 py-2 text-white">
                                                                    {pago.fecha ? new Date(pago.fecha + 'T12:00:00').toLocaleDateString('es-CO', { day: '2-digit', month: 'short', year: 'numeric' }) : '-'}
                                                                </td>
                                                                <td className="px-3 py-2 text-white font-medium">{pago.beneficiario || '-'}</td>
                                                                <td className="px-3 py-2 text-right text-white">
                                                                    ${(pago.totalDevengado || 0).toLocaleString('es-CO')}
                                                                </td>
                                                                <td className="px-3 py-2 text-right text-gray-400">
                                                                    ${(pago.totalDeducciones || 0).toLocaleString('es-CO')}
                                                                </td>
                                                                <td className="px-3 py-2 text-right font-bold text-[#ff073a]">
                                                                    ${(pago.totalPagado || 0).toLocaleString('es-CO')}
                                                                </td>
                                                                <td className="px-3 py-2 text-center">
                                                                    {pago.archivoAdjunto ? (
                                                                        pago.tipoArchivo?.startsWith('image/') ? (
                                                                            <button
                                                                                onClick={() => {
                                                                                    const nuevaVentana = window.open();
                                                                                    nuevaVentana.document.write(`
                                                                                        <html>
                                                                                            <head><title>Comprobante - ${pago.beneficiario || 'Pago'}</title></head>
                                                                                            <body style="margin:0; padding:20px; background:#1f2937;">
                                                                                                <img src="${pago.archivoAdjunto}" style="max-width: 100%; height: auto; border: 2px solid #ff073a; border-radius: 8px;" />
                                                                                            </body>
                                                                                        </html>
                                                                                    `);
                                                                                }}
                                                                                className="text-[#ff073a] hover:underline text-xs font-medium"
                                                                            >
                                                                                📷 Ver Imagen
                                                                            </button>
                                                                        ) : (
                                                                            <a
                                                                                href={pago.archivoAdjunto}
                                                                                target="_blank"
                                                                                rel="noopener noreferrer"
                                                                                className="text-[#ff073a] hover:underline text-xs font-medium"
                                                                            >
                                                                                📄 Ver PDF
                                                                            </a>
                                                                        )
                                                                    ) : (
                                                                        <span className="text-gray-500 text-xs">Sin comprobante</span>
                                                                    )}
                                                                </td>
                                                                <td className="px-3 py-2 text-center">
                                                                    <span className="px-2 py-1 bg-[#22c55e] text-white rounded-full text-xs font-medium">✓ Pagado</span>
                                                                </td>
                                                            </tr>
                                                        ))}
                                                    </tbody>
                                                </table>
                                            </div>
                                        );
                                    } catch (error) {
                                        console.error('Error en historial de pagos:', error);
                                        return (
                                            <div className="text-center py-8 text-red-400">
                                                <span className="text-4xl mb-2 block">⚠️</span>
                                                <p>Error al cargar el historial de pagos</p>
                                                <p className="text-sm mt-1 text-gray-500">{error.message}</p>
                                            </div>
                                        );
                                    }
                                })()}
                                </div>
                                )}
                            </div>

                        </div>
                    )}
                    </div>
                </main>
                </div>
            );
        }

        try {
            const root = ReactDOM.createRoot(document.getElementById('root'));
            root.render(<App />);
        } catch (error) {
            console.error('Error al renderizar la aplicación:', error);
            document.getElementById('root').innerHTML = `
                <div style="padding: 20px; color: red; background: white;">
                    <h1>Error al cargar la aplicación</h1>
                    <p>${error.message}</p>
                    <pre>${error.stack}</pre>
                </div>
            `;
        }
    </script>

</body></html>
